[tasks.client]
install_crate = "trunk"
command = "trunk"
args = ["serve", "--open"]

[tasks.lint]
command = "cargo"
args = ["clippy", "--all-features"]

[tasks.test]
command = "cargo"
args = ["test", "--all-features"]

[tasks.format]
command = "cargo"
args = ["fmt", "--all"]

# workflows

[tasks.check]
dependencies = ["format", "lint"]

[tasks.submit]
dependencies = ["format", "test", "lint"]

# aliases

[tasks.rc]
alias = "client"

[tasks.c]
alias = "check"

[tasks.s]
alias = "submit"
